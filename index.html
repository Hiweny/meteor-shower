<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Meteor Shower</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; -webkit-tap-highlight-color: transparent; touch-action: none; }
  canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  #bgCanvas { z-index: 1; } #meteorCanvas { z-index: 2; } #fgCanvas { z-index: 3; }
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<canvas id="meteorCanvas"></canvas>
<canvas id="fgCanvas"></canvas>
<script>
(function(){
const bgC=document.getElementById('bgCanvas'),mC=document.getElementById('meteorCanvas'),fgC=document.getElementById('fgCanvas');
const bgX=bgC.getContext('2d'),mX=mC.getContext('2d'),fgX=fgC.getContext('2d');
let W,H,dpr,bgStars=[],constellations=[],meteors=[],fireflies=[],moonData={};
function R(a,b){return a+Math.random()*(b-a)}
function RI(a,b){return Math.floor(R(a,b+1))}
function resize(){
dpr=Math.min(window.devicePixelRatio||1,2);W=window.innerWidth;H=window.innerHeight;
[bgC,mC,fgC].forEach(c=>{c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px'});
bgX.setTransform(dpr,0,0,dpr,0,0);mX.setTransform(dpr,0,0,dpr,0,0);fgX.setTransform(dpr,0,0,dpr,0,0)}
function genStars(n){const a=[];for(let i=0;i<n;i++)a.push({x:R(0,W),y:R(0,H*.78),r:R(.3,2),b:R(.3,1),ts:R(.005,.03),to:R(0,Math.PI*2),hc:Math.random()<.12,cl:R(2,6),h:Math.random()<.15?R(200,240):0});return a}
function genCons(){const g=[];for(let c=0;c<RI(3,5);c++){const cx=R(W*.1,W*.85),cy=R(H*.05,H*.55),ns=[];for(let i=0;i<RI(4,8);i++)ns.push({x:cx+R(-80,80),y:cy+R(-60,60),r:R(1,2.2),b:R(.6,1),gc:Math.random()<.3?'180,210,255':'255,255,255'});const es=[];for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++)if(Math.random()<.45)es.push([i,j]);if(!es.length&&ns.length>=2)es.push([0,1]);g.push({nodes:ns,edges:es})}return g}
function initMoon(){moonData={x:W*.82,y:H*.13,r:Math.min(W,H)*.065,gr:Math.min(W,H)*.12}}
function drawMoon(ctx){const{x,y,r,gr}=moonData;const mg=ctx.createRadialGradient(x-r*.2,y-r*.2,r*.1,x,y,r);mg.addColorStop(0,'#fff8e8');mg.addColorStop(.4,'#f5e6c8');mg.addColorStop(.75,'#e8d5a3');mg.addColorStop(1,'#d4c080');ctx.fillStyle=mg;ctx.beginPath();ctx.arc(x,y,r,-Math.PI*.35,Math.PI*.55);ctx.arc(x-r*.3,y+r*.1,r*.78,Math.PI*.55,-Math.PI*.35,true);ctx.closePath();ctx.fill();const gl=ctx.createRadialGradient(x,y,r*.5,x,y,gr);gl.addColorStop(0,'rgba(255,240,180,.15)');gl.addColorStop(.5,'rgba(255,220,140,.05)');gl.addColorStop(1,'rgba(255,200,100,0)');ctx.fillStyle=gl;ctx.beginPath();ctx.arc(x,y,gr,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(180,160,120,.15)';ctx.beginPath();ctx.arc(x+r*.15,y-r*.15,r*.12,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+r*.3,y+r*.05,r*.1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+r*.1,y+r*.25,r*.08,0,Math.PI*2);ctx.fill()}
function drawGround(ctx){const gy=H*.78;const gg=ctx.createLinearGradient(0,gy,0,H);gg.addColorStop(0,'#0a1f0a');gg.addColorStop(.3,'#061506');gg.addColorStop(.7,'#020a02');gg.addColorStop(1,'#000400');ctx.fillStyle=gg;ctx.beginPath();ctx.moveTo(0,gy);for(let x=0;x<=W;x+=5){const w=Math.sin(x*.004)*8+Math.sin(x*.012+1.5)*5+Math.sin(x*.02+3)*3;ctx.lineTo(x,gy+w)}ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();ctx.fillStyle='#0d220d';for(let i=0;i<60;i++){const gx=R(0,W),gy2=gy+R(-5,25);ctx.beginPath();ctx.moveTo(gx,gy2);ctx.quadraticCurveTo(gx-R(3,15),gy2-R(10,35),gx-R(5,20),gy2-R(5,20));ctx.quadraticCurveTo(gx,gy2-R(15,40),gx+R(5,20),gy2-R(5,20));ctx.quadraticCurveTo(gx+R(3,15),gy2-R(10,35),gx,gy2);ctx.fill()}const tg=ctx.createLinearGradient(W*.55,0,W,0);tg.addColorStop(0,'rgba(8,22,8,0)');tg.addColorStop(.5,'rgba(8,22,8,.7)');tg.addColorStop(1,'rgba(6,18,6,.95)');ctx.fillStyle=tg;ctx.beginPath();ctx.moveTo(W*.55,gy);ctx.quadraticCurveTo(W*.6,gy-40,W*.65,gy-20);ctx.quadraticCurveTo(W*.7,gy-55,W*.75,gy-30);ctx.quadraticCurveTo(W*.8,gy-60,W*.85,gy-25);ctx.quadraticCurveTo(W*.9,gy-50,W*.95,gy-15);ctx.quadraticCurveTo(W,gy-30,W,gy);ctx.lineTo(W,H);ctx.lineTo(W*.55,H);ctx.closePath();ctx.fill();ctx.fillStyle='#061806';ctx.beginPath();ctx.moveTo(W*.78,gy);ctx.quadraticCurveTo(W*.8,gy-50,W*.82,gy-35);ctx.quadraticCurveTo(W*.84,gy-70,W*.86,gy-30);ctx.quadraticCurveTo(W*.88,gy-55,W*.9,gy-20);ctx.quadraticCurveTo(W*.92,gy-40,W*.94,gy-10);ctx.quadraticCurveTo(W,gy-20,W,gy);ctx.lineTo(W,H);ctx.lineTo(W*.78,H);ctx.closePath();ctx.fill();for(let i=0;i<40;i++){const fx=R(0,W),fy=gy+R(5,H-gy-10),fr=R(.8,2),a=R(.2,.6);ctx.fillStyle=`rgba(220,230,255,${a})`;ctx.beginPath();ctx.arc(fx,fy,fr,0,Math.PI*2);ctx.fill();const fg2=ctx.createRadialGradient(fx,fy,0,fx,fy,fr*3);fg2.addColorStop(0,`rgba(200,210,255,${a*.5})`);fg2.addColorStop(1,'rgba(200,210,255,0)');ctx.fillStyle=fg2;ctx.beginPath();ctx.arc(fx,fy,fr*3,0,Math.PI*2);ctx.fill()}}
function initFF(){fireflies=[];const gy=H*.78;for(let i=0;i<30;i++)fireflies.push({x:R(0,W),y:R(gy-20,H-10),r:R(1.5,3.5),ba:R(.3,.8),a:0,p:R(0,Math.PI*2),s:R(.01,.04),dx:R(-.3,.3),dy:R(-.3,.1),h:Math.random()<.3?'180,220,255':'200,230,255'})}
function updFF(){const gy=H*.78;fireflies.forEach(f=>{f.a=f.ba*(.5+.5*Math.sin(Date.now()*.001*f.s*10+f.p));f.x+=f.dx;f.y+=f.dy;if(f.x<0)f.x=W;if(f.x>W)f.x=0;if(f.y<gy-25)f.y=gy-25;if(f.y>H)f.y=gy+5})}
function drawFF(ctx){fireflies.forEach(f=>{if(f.a<.05)return;const g=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*4);g.addColorStop(0,`rgba(${f.h},${f.a})`);g.addColorStop(.4,`rgba(${f.h},${f.a*.4})`);g.addColorStop(1,`rgba(${f.h},0)`);ctx.fillStyle=g;ctx.beginPath();ctx.arc(f.x,f.y,f.r*4,0,Math.PI*2);ctx.fill();ctx.fillStyle=`rgba(255,255,255,${f.a*.8})`;ctx.beginPath();ctx.arc(f.x,f.y,f.r*.5,0,Math.PI*2);ctx.fill()})}
function createMeteor(fe){const a=R(-Math.PI*.22,-Math.PI*.58),s=R(2.5,7),vx=Math.cos(a)*s,vy=-Math.sin(a)*s;let x,y;if(fe){if(Math.random()<.6){x=R(-50,W*.3);y=R(-50,H*.15)}else{x=R(-50,W*.15);y=R(-50,H*.35)}}else{x=R(0,W);y=R(0,H*.6)}const fb=Math.random()<.12,hs=fb?R(2.5,4.5):R(1.2,2.8),tl=fb?R(80,200):R(30,120),l=R(40,100),hue=Math.random()<.25?R(235,260):R(200,230);return{x,y,vx,vy,headSize:hs,tailLen:tl,life:l,maxLife:l,isFireball:fb,hue,a:1,trail:[],maxTrail:Math.floor(tl/3)}}
function initMeteors(){meteors=[];for(let i=0;i<45;i++)meteors.push(createMeteor(false))}
function updMeteors(){const tc=45+Math.floor(Math.random()*15);while(meteors.length<tc)meteors.push(createMeteor(true));for(let i=meteors.length-1;i>=0;i--){const m=meteors[i];m.life--;m.x+=m.vx;m.y+=m.vy;m.trail.unshift({x:m.x,y:m.y});if(m.trail.length>m.maxTrail)m.trail.pop();m.a=Math.min(1,m.life/(m.maxLife*.3));if(m.life<m.maxLife*.15)m.a=m.life/(m.maxLife*.15);if(m.life<=0||m.x>W+100||m.y>H+100||(m.x<-100&&m.vx<0)||(m.y<-100&&m.vy<0))meteors.splice(i,1)}}
function drawMeteors(ctx){meteors.forEach(m=>{if(m.a<.02)return;const a=m.a;if(m.trail.length>1){for(let t=0;t<m.trail.length-1;t++){const ta=a*(1-t/m.trail.length)*.7;if(ta<.01)continue;const p0=m.trail[t],p1=m.trail[t+1],w=m.headSize*(1-t/m.trail.length)*.8;ctx.strokeStyle=`rgba(${Math.floor(m.hue)},${Math.floor(m.hue-30)},255,${ta})`;ctx.lineWidth=Math.max(.3,w);ctx.lineCap='round';ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);ctx.stroke();ctx.strokeStyle=`rgba(${Math.floor(m.hue)},${Math.floor(m.hue-30)},255,${ta*.3})`;ctx.lineWidth=Math.max(.5,w*2.5);ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);ctx.stroke()}}const gr=m.headSize*(m.isFireball?5:3.5);const gl=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,gr);gl.addColorStop(0,`rgba(${Math.floor(m.hue)},${Math.floor(m.hue-40)},255,${a*.9})`);gl.addColorStop(.3,`rgba(${Math.floor(m.hue)},${Math.floor(m.hue-40)},255,${a*.5})`);gl.addColorStop(.6,`rgba(${Math.floor(m.hue-40)},${Math.floor(m.hue-60)},255,${a*.15})`);gl.addColorStop(1,'rgba(100,120,255,0)');ctx.fillStyle=gl;ctx.beginPath();ctx.arc(m.x,m.y,gr,0,Math.PI*2);ctx.fill();const cr=m.headSize*.6;const co=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,cr);co.addColorStop(0,`rgba(255,255,255,${a})`);co.addColorStop(.5,`rgba(230,240,255,${a*.9})`);co.addColorStop(1,`rgba(180,200,255,${a*.3})`);ctx.fillStyle=co;ctx.beginPath();ctx.arc(m.x,m.y,cr,0,Math.PI*2);ctx.fill();ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.beginPath();ctx.arc(m.x,m.y,m.headSize*.25,0,Math.PI*2);ctx.fill()})}
function drawStars(ctx,t){bgStars.forEach(s=>{const tw=.5+.5*Math.sin(t*s.ts+s.to),a=s.b*(.7+.3*tw);if(s.h>0)ctx.fillStyle=`rgba(180,210,255,${a})`;else ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();if(s.hc&&tw>.7){const ca=a*(tw-.7)*3;ctx.strokeStyle=`rgba(255,255,255,${ca*.5})`;ctx.lineWidth=.5;const cl=s.cl;ctx.beginPath();ctx.moveTo(s.x-cl,s.y);ctx.lineTo(s.x+cl,s.y);ctx.moveTo(s.x,s.y-cl);ctx.lineTo(s.x,s.y+cl);ctx.stroke();const cd=cl*.6;ctx.beginPath();ctx.moveTo(s.x-cd,s.y-cd);ctx.lineTo(s.x+cd,s.y+cd);ctx.moveTo(s.x+cd,s.y-cd);ctx.lineTo(s.x-cd,s.y+cd);ctx.stroke()}})}
function drawCons(ctx){constellations.forEach(g=>{ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=.6;g.edges.forEach(([a,b])=>{ctx.beginPath();ctx.moveTo(g.nodes[a].x,g.nodes[a].y);ctx.lineTo(g.nodes[b].x,g.nodes[b].y);ctx.stroke()});g.nodes.forEach(n=>{const gl=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*3);gl.addColorStop(0,`rgba(${n.gc},${n.b*.8})`);gl.addColorStop(.5,`rgba(${n.gc},${n.b*.2})`);gl.addColorStop(1,`rgba(${n.gc},0)`);ctx.fillStyle=gl;ctx.beginPath();ctx.arc(n.x,n.y,n.r*3,0,Math.PI*2);ctx.fill();ctx.fillStyle=`rgba(${n.gc},${n.b})`;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill()})})}
function init(){resize();bgStars=genStars(Math.floor(W*H*.0004));constellations=genCons();initMoon();initMeteors();initFF()}
function drawBG(t){const ctx=bgX;ctx.clearRect(0,0,W,H);ctx.fillStyle='#000205';ctx.fillRect(0,0,W,H);const sg=ctx.createLinearGradient(0,0,0,H);sg.addColorStop(0,'#000308');sg.addColorStop(.5,'#000205');sg.addColorStop(.78,'#010a04');sg.addColorStop(1,'#020d04');ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);drawStars(ctx,t);drawCons(ctx);drawMoon(ctx);drawGround(ctx)}
function drawFG(){const ctx=fgX;ctx.clearRect(0,0,W,H);drawFF(ctx)}
function animate(ts){const t=ts*.001;updMeteors();updFF();drawBG(t);mX.clearRect(0,0,W,H);drawMeteors(mX);drawFG();requestAnimationFrame(animate)}
let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{resize();bgStars=genStars(Math.floor(W*H*.0004));constellations=genCons();initMoon();initFF()},200)});
init();requestAnimationFrame(animate);
})();
</script>
</body>
</html>
